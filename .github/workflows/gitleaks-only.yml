name: GitLeaks Only Baseline

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  gitleaks-only:
    name: Scan with GitLeaks only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout demo project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitLeaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/scripts/install.sh | sh -s -- -b /usr/local/bin
          gitleaks version

      - name: Run GitLeaks only
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect \
            --source "." \
            --config ".gitleaks.toml" \
            --report-format json \
            --report-path gitleaks-report.json \
            --redact \
            --exit-code 1

      - name: Generate GitLeaks SARIF
        if: always()
        continue-on-error: true
        run: |
          gitleaks detect \
            --source "." \
            --config ".gitleaks.toml" \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --redact \
            --exit-code 0

      - name: Debug GitLeaks reports
        if: always()
        run: |
          echo "===== GitLeaks Reports ====="
          ls -la gitleaks-report.* || true

          echo "===== GitLeaks JSON preview ====="
          head -c 2000 gitleaks-report.json || true
          echo

      - name: Upload GitLeaks reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-only-reports
          if-no-files-found: warn
          path: |
            gitleaks-report.json
            gitleaks-report.sarif
            gitleaks-report.csv

      - name: Upload GitLeaks SARIF to GitHub Code Scanning
        if: ${{ always() && github.event_name != 'pull_request' && hashFiles('gitleaks-report.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif

      - name: Fail job if GitLeaks found secrets
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "GitLeaks found secrets. Reports were generated and uploaded."
          exit 1