name: GitLeaks Only Baseline

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  gitleaks-only:
    name: Scan with GitLeaks only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout demo project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitLeaks
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y jq

          ASSET_URL=$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_x64\\.tar\\.gz$")) | .browser_download_url' \
            | head -n 1)

          echo "Downloading GitLeaks from: ${ASSET_URL}"

          curl -sSfL "$ASSET_URL" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

          gitleaks version

      - name: Prepare GitLeaks config
        run: |
          if [ -f ".gitleaks.toml" ]; then
            echo "Using custom .gitleaks.toml"
            echo 'CONFIG_ARGS=--config .gitleaks.toml' >> "$GITHUB_ENV"
          else
            echo "No .gitleaks.toml found. Using GitLeaks default rules."
            echo 'CONFIG_ARGS=' >> "$GITHUB_ENV"
          fi

          mkdir -p reports

      - name: Run GitLeaks JSON
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect \
            --source "." \
            $CONFIG_ARGS \
            --report-format json \
            --report-path reports/gitleaks-report.json \
            --redact \
            --exit-code 1

      - name: Generate GitLeaks SARIF
        if: always()
        continue-on-error: true
        run: |
          gitleaks detect \
            --source "." \
            $CONFIG_ARGS \
            --report-format sarif \
            --report-path reports/gitleaks-report.sarif \
            --redact \
            --exit-code 0

      - name: Generate GitLeaks CSV
        if: always()
        continue-on-error: true
        run: |
          gitleaks detect \
            --source "." \
            $CONFIG_ARGS \
            --report-format csv \
            --report-path reports/gitleaks-report.csv \
            --redact \
            --exit-code 0

      - name: Debug GitLeaks reports
        if: always()
        run: |
          echo "===== Root files ====="
          ls -la

          echo "===== Reports directory ====="
          ls -la reports || true

          echo "===== JSON preview ====="
          head -c 2000 reports/gitleaks-report.json || true
          echo

          echo "===== CSV preview ====="
          head -n 20 reports/gitleaks-report.csv || true

      - name: Upload GitLeaks reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-only-reports
          if-no-files-found: warn
          path: |
            reports/gitleaks-report.json
            reports/gitleaks-report.sarif
            reports/gitleaks-report.csv

      - name: Upload GitLeaks SARIF to GitHub Code Scanning
        if: ${{ always() && github.event_name != 'pull_request' && hashFiles('reports/gitleaks-report.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/gitleaks-report.sarif

      - name: Fail job if GitLeaks found secrets
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "GitLeaks found secrets."
          echo "Reports were generated and uploaded."
          exit 1