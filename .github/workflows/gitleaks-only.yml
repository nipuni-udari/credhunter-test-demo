name: GitLeaks Only Baseline

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  gitleaks-only:
    name: Scan with GitLeaks only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout demo project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitLeaks
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y jq

          GITLEAKS_VERSION=$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)

          ASSET_URL=$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_x64\\.tar\\.gz$")) | .browser_download_url' \
            | head -n 1)

          echo "Installing GitLeaks ${GITLEAKS_VERSION}"
          echo "Asset URL: ${ASSET_URL}"

          curl -sSfL "$ASSET_URL" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz

          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

          gitleaks version

      - name: Run GitLeaks only JSON
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect \
            --source "." \
            --config ".gitleaks.toml" \
            --report-format json \
            --report-path gitleaks-report.json \
            --redact \
            --exit-code 1

      - name: Generate GitLeaks SARIF
        if: always()
        continue-on-error: true
        run: |
          gitleaks detect \
            --source "." \
            --config ".gitleaks.toml" \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --redact \
            --exit-code 0

      - name: Generate GitLeaks CSV
        if: always()
        continue-on-error: true
        run: |
          gitleaks detect \
            --source "." \
            --config ".gitleaks.toml" \
            --report-format csv \
            --report-path gitleaks-report.csv \
            --redact \
            --exit-code 0

      - name: Debug GitLeaks reports
        if: always()
        run: |
          echo "===== Current Directory ====="
          pwd

          echo "===== GitLeaks Reports ====="
          ls -la gitleaks-report.* || true

          echo "===== JSON Preview ====="
          head -c 2000 gitleaks-report.json || true
          echo

          echo "===== CSV Preview ====="
          head -n 20 gitleaks-report.csv || true

      - name: Upload GitLeaks reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-only-reports
          if-no-files-found: warn
          path: |
            gitleaks-report.json
            gitleaks-report.sarif
            gitleaks-report.csv

      - name: Upload GitLeaks SARIF to GitHub Code Scanning
        if: ${{ always() && github.event_name != 'pull_request' && hashFiles('gitleaks-report.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif

      - name: Fail job if GitLeaks found secrets
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "GitLeaks found secrets."
          echo "JSON, SARIF, and CSV reports were generated and uploaded."
          exit 1